# enabled=no
# show_values=yes
# invert_mouse=no
# Mouse sensitivity (in radians per pixel). Default is 0.0035 (approx 0.2 deg/px).
# Increase this (e.g. to 0.007 or 0.01) to rotate further with shorter drags.
# Note: since mpv's cursor position is read-only, it cannot be warped to the window center,
# so dragging is naturally bounded by the screen borders.
# mouse_sensitivity=0.0035
# invert_keyboard=no
# step=0.013
# fisheye_fov_step=0.1745329251

## Initial camera orientation (in radians)
# yaw=0.0
# pitch=0.0
# roll=0.0
# fov=2.1

# input_projection=0
# eye=0
# fisheye_fov=3.1415926535897932
# sampling=0

## Keybindings
toggle=Ctrl+e
look-up=Ctrl+up
look-down=Ctrl+down
look-left=Ctrl+left
look-right=Ctrl+right
roll-left=Ctrl+Shift+left
roll-right=Ctrl+Shift+right
fov-increase=Ctrl+Shift+down
fov-decrease=Ctrl+Shift+up
cycle-projection=Ctrl+Shift+p
fisheye-fov-increase=Ctrl+f
fisheye-fov-decrease=Ctrl+Shift+f
switch-eye=Ctrl+Shift+e
cycle-sampling=Ctrl+Shift+s
toggle-mouse-look=Ctrl+MBTN_LEFT
reset-view=Ctrl+r
show-help=Ctrl+t

# Lens seam blending adjustment (Dual Fisheye only)
blend-increase=Ctrl+b
blend-decrease=Ctrl+Shift+b
